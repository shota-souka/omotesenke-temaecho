<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>点前比較</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

header {
  padding: 10px;
  background: #333;
  color: white;
}

header input, header select {
  padding: 4px;
}

.container {
  display: flex;
  height: calc(100vh - 50px);
}

.panel {
  flex: 1;
  overflow-y: auto;
  border-right: 1px solid #ddd;
  padding: 10px;
}

.step {
  padding: 10px;
  margin-bottom: 8px;
  border: 1px solid #ccc;
  cursor: pointer;
  background: #fff;
}

.diff {
  background: #ffe5e5;
  border-left: 4px solid red;
}

.hidden {
  display: none;
}

/* modal */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.modal-content {
  background: white;
  width: 420px;
  margin: 100px auto;
  padding: 20px;
  border-radius: 8px;
}
</style>
</head>

<body>

<header>
  <select id="leftSelect"></select>
  vs
  <select id="rightSelect"></select>

  <label style="margin-left:10px;">
    <input type="checkbox" id="diffOnly"> 違いだけ表示
  </label>

  <input id="searchBox" placeholder="差分検索（例：柄杓）" />
</header>

<div class="container">
  <div id="leftPanel" class="panel"></div>
  <div id="rightPanel" class="panel"></div>
</div>

<!-- modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle"></h3>
    <p id="modalText"></p>

    <label>差分理由（note）</label>
    <textarea id="modalNote" style="width:100%;height:120px;"></textarea>

    <div style="margin-top:10px;">
      <button onclick="saveNote()">保存</button>
      <button onclick="closeModal()">閉じる</button>
    </div>
  </div>
</div>

<script>
// ======================
// データ
// ======================
let data = [
  {
    name: "平点前",
    steps: [
      { id: "a1", title: "茶碗を出す", text: "茶碗を清めて出す", note: "" },
      { id: "a2", title: "柄杓を持つ", text: "柄杓を構える", note: "" },
      { id: "a3", title: "茶を点てる", text: "茶を点てる", note: "" }
    ]
  },
  {
    name: "丸卓",
    steps: [
      { id: "b1", title: "茶碗を出す", text: "茶碗を清めて出す", note: "" },
      { id: "b2", title: "柄杓を持つ", text: "柄杓の扱いが異なる", note: "" },
      { id: "b3", title: "茶を点てる", text: "茶を点てる", note: "丸卓では位置が違う" }
    ]
  }
];

// ======================
let currentStep = null;

// ======================
const leftPanel = document.getElementById("leftPanel");
const rightPanel = document.getElementById("rightPanel");

const leftSelect = document.getElementById("leftSelect");
const rightSelect = document.getElementById("rightSelect");

const diffOnly = document.getElementById("diffOnly");
const searchBox = document.getElementById("searchBox");

// ======================
function init() {
  loadFromLocal();

  data.forEach((t, i) => {
    const o1 = document.createElement("option");
    o1.value = i;
    o1.textContent = t.name;
    leftSelect.appendChild(o1);

    const o2 = document.createElement("option");
    o2.value = i;
    o2.textContent = t.name;
    rightSelect.appendChild(o2);
  });

  leftSelect.value = 0;
  rightSelect.value = 1;

  leftSelect.onchange = render;
  rightSelect.onchange = render;
  diffOnly.onchange = render;
  searchBox.oninput = render;

  setupScrollSync();
  render();
}

// ======================
function render() {
  const left = data[leftSelect.value];
  const right = data[rightSelect.value];

  const keyword = searchBox.value.trim().toLowerCase();

  leftPanel.innerHTML = "";
  rightPanel.innerHTML = "";

  const max = Math.max(left.steps.length, right.steps.length);

  for (let i = 0; i < max; i++) {
    const l = left.steps[i];
    const r = right.steps[i];

    const diff =
      !l ||
      !r ||
      l.title !== r.title ||
      l.text !== r.text;

    const match = (s) => {
      if (!s) return false;
      if (!keyword) return true;

      return (
        s.title.toLowerCase().includes(keyword) ||
        s.text.toLowerCase().includes(keyword) ||
        (s.note || "").toLowerCase().includes(keyword)
      );
    };

    if (diffOnly.checked && !diff && !keyword) continue;

    const lMatch = match(l);
    const rMatch = match(r);

    if (keyword && !lMatch && !rMatch) continue;

    if (l && lMatch) {
      leftPanel.appendChild(createStep(l, diff));
    }

    if (r && rMatch) {
      rightPanel.appendChild(createStep(r, diff));
    }
  }
}

// ======================
function createStep(step, isDiff) {
  const div = document.createElement("div");
  div.className = "step";

  if (isDiff) div.classList.add("diff");

  div.innerHTML = `<b>${step.title}</b><br>${step.text}`;

  div.onclick = () => openModal(step);

  return div;
}

// ======================
function openModal(step) {
  currentStep = step;

  document.getElementById("modalTitle").innerText = step.title;
  document.getElementById("modalText").innerText = step.text;
  document.getElementById("modalNote").value = step.note || "";

  document.getElementById("modal").style.display = "block";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// ======================
function saveNote() {
  if (!currentStep) return;

  currentStep.note = document.getElementById("modalNote").value;

  saveToLocal();
  render();
  closeModal();
}

// ======================
function setupScrollSync() {
  let lock = false;

  leftPanel.onscroll = () => {
    if (lock) return;
    lock = true;
    rightPanel.scrollTop = leftPanel.scrollTop;
    lock = false;
  };

  rightPanel.onscroll = () => {
    if (lock) return;
    lock = true;
    leftPanel.scrollTop = rightPanel.scrollTop;
    lock = false;
  };
}

// ======================
function saveToLocal() {
  localStorage.setItem("temaeData", JSON.stringify(data));
}

function loadFromLocal() {
  const saved = localStorage.getItem("temaeData");
  if (saved) {
    data = JSON.parse(saved);
  }
}

// ======================
init();
</script>

</body>
</html>
