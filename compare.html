<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>点前比較</title>

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 12px;
      background: #f7f7f7;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    a {
      text-decoration: none;
      color: #333;
      font-size: 14px;
    }

    h1 {
      font-size: 18px;
      margin: 0;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    select, button {
      padding: 6px;
      font-size: 14px;
    }

    label {
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .wrap {
      display: flex;
      gap: 10px;
    }

    .box {
      flex: 1;
      background: white;
      padding: 10px;
      border-radius: 8px;
      height: 70vh;
      overflow-y: auto;
    }

    .step {
      padding: 6px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
      cursor: pointer;
    }

    .step small {
      display: block;
      color: #666;
      font-size: 12px;
    }

    .diff {
      background: #ffe5e5;
      border-left: 4px solid #ff4d4d;
    }

    /* モーダル */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
    }

    .modal-content {
      background: white;
      margin: 20% auto;
      padding: 16px;
      width: 80%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>点前比較</h1>
  <a href="index.html">← ホーム</a>
</header>

<div class="controls">
  <select id="left"></select>
  <select id="right"></select>

  <label>
    <input type="checkbox" id="diffOnly" onchange="render()">
    違いだけ表示
  </label>

  <button onclick="render()">比較</button>
</div>

<div class="wrap">
  <div class="box" id="leftView"></div>
  <div class="box" id="rightView"></div>
</div>

<!-- モーダル -->
<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3 id="modalTitle"></h3>
    <p id="modalText"></p>
    <small id="modalNote" style="color:#c00;"></small>
    <br><br>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>
const temaeData = {
  hira: {
    name: "薄茶・平点前",
    steps: [
      { id: 1, title: "席入り", text: "茶室に入る" },
      { id: 2, title: "茶碗を清める", text: "茶碗を拭く", note: "丸卓や棚点前では省略されることがある" },
      { id: 3, title: "茶筅通し", text: "茶筅を温める" },
      { id: 4, title: "抹茶を入れる", text: "茶杓で抹茶をすくう", note: "丸卓では手順が簡略化される" },
      { id: 5, title: "点てる", text: "茶を点てる" }
    ]
  },

  maru: {
    name: "薄茶・丸卓",
    steps: [
      { id: 1, title: "席入り", text: "茶室に入る" },
      { id: 2, title: "茶碗を清める", text: "茶碗を拭く" },
      { id: 3, title: "茶筅通し", text: "茶筅を温める" },
      { id: 4, title: "抹茶を入れる", text: "丸卓では手順が異なる", note: "平点前と動作順が異なる" },
      { id: 5, title: "点てる", text: "茶を点てる" }
    ]
  },

  tana: {
    name: "薄茶・棚点前",
    steps: [
      { id: 1, title: "席入り", text: "茶室に入る" },
      { id: 2, title: "道具確認", text: "棚を確認する", note: "棚構成により手順が変化" },
      { id: 3, title: "茶碗を清める", text: "茶碗を拭く" },
      { id: 4, title: "抹茶を入れる", text: "棚仕様の流れで入れる" },
      { id: 5, title: "点てる", text: "茶を点てる" }
    ]
  }
};

/* 初期化 */
function init() {
  const left = document.getElementById("left");
  const right = document.getElementById("right");

  Object.keys(temaeData).forEach(key => {
    const opt1 = document.createElement("option");
    opt1.value = key;
    opt1.textContent = temaeData[key].name;
    left.appendChild(opt1);

    const opt2 = document.createElement("option");
    opt2.value = key;
    opt2.textContent = temaeData[key].name;
    right.appendChild(opt2);
  });

  left.value = "hira";
  right.value = "maru";

  render();
  setupScrollSync();
}

/* 描画 */
function render() {
  const l = document.getElementById("left").value;
  const r = document.getElementById("right").value;
  const diffOnly = document.getElementById("diffOnly")?.checked || false;

  const leftData = temaeData[l];
  const rightData = temaeData[r];

  const maxLen = Math.max(leftData.steps.length, rightData.steps.length);

  let leftHTML = "";
  let rightHTML = "";

  for (let i = 0; i < maxLen; i++) {
    const ls = leftData.steps[i];
    const rs = rightData.steps[i];

    const isDiff =
      !ls || !rs ||
      ls.title !== rs.title ||
      ls.text !== rs.text;

    if (diffOnly && !isDiff) continue;

    if (ls) {
      leftHTML += `
        <div class="step ${isDiff ? "diff" : ""}"
             onclick='openModal(${JSON.stringify(ls)})'>
          ${ls.id}. ${ls.title}
          <small>${ls.text}</small>
          ${ls.note ? `<small style="color:#c00;">理由: ${ls.note}</small>` : ""}
        </div>`;
    }

    if (rs) {
      rightHTML += `
        <div class="step ${isDiff ? "diff" : ""}"
             onclick='openModal(${JSON.stringify(rs)})'>
          ${rs.id}. ${rs.title}
          <small>${rs.text}</small>
          ${rs.note ? `<small style="color:#c00;">理由: ${rs.note}</small>` : ""}
        </div>`;
    }
  }

  document.getElementById("leftView").innerHTML = leftHTML;
  document.getElementById("rightView").innerHTML = rightHTML;
}

/* スクロール同期 */
function setupScrollSync() {
  const leftView = document.getElementById("leftView");
  const rightView = document.getElementById("rightView");

  let syncing = false;

  leftView.addEventListener("scroll", () => {
    if (syncing) return;
    syncing = true;
    rightView.scrollTop = leftView.scrollTop;
    syncing = false;
  });

  rightView.addEventListener("scroll", () => {
    if (syncing) return;
    syncing = true;
    leftView.scrollTop = rightView.scrollTop;
    syncing = false;
  });
}

/* モーダル */
function openModal(data) {
  document.getElementById("modalTitle").textContent = data.title;
  document.getElementById("modalText").textContent = data.text;
  document.getElementById("modalNote").textContent = data.note ? "理由: " + data.note : "";
  document.getElementById("modal").style.display = "block";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

document.addEventListener("DOMContentLoaded", init);
</script>

</body>
</html>
