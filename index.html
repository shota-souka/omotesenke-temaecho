<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>茶道アプリ</title>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 24px;
    }

    #card {
      margin-top: 40px;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 12px;
    }

    #stepInfo {
      color: #666;
      margin-bottom: 10px;
    }

    button {
      margin-top: 20px;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      background: #333;
      color: white;
    }

    button:disabled {
      background: #aaa;
    }
    #card {
  margin-top: 20px;
}
  </style>
</head>

<body>

  <h1 id="title">読み込み中...</h1>

  <div id="card">
    <div id="stepInfo"></div>
    <h2 id="stepTitle"></h2>
    <p id="stepText"></p>

    <button id="nextBtn">次へ</button>
  </div>

  <script>
    const data = {
  name: "薄茶・平点前",
  steps: [
    { id: 1, title: "席入り", text: "茶室に入り、客座に着く" },
    { id: 2, title: "茶碗を清める", text: "茶碗を拭く" },
    { id: 3, title: "茶筅通し", text: "茶筅を湯で温める" },
    { id: 4, title: "抹茶を入れる", text: "茶杓で抹茶をすくう" },
    { id: 5, title: "点てる", text: "茶を点てる" },
    { id: 6, title: "客へ出す", text: "茶碗を客に出す" }
  ]
};

document.getElementById("title").textContent = data.name;

const container = document.getElementById("card");

// 一旦中身クリア
container.innerHTML = "";

// ステップを全部表示
data.steps.forEach(step => {
  const div = document.createElement("div");
  div.style.border = "1px solid #ddd";
  div.style.borderRadius = "10px";
  div.style.padding = "12px";
  div.style.marginBottom = "12px";
  div.style.textAlign = "left";

  div.innerHTML = `
    <strong>${step.id}. ${step.title}</strong>
    <p>${step.text}</p>
  `;

  container.appendChild(div);
});

  </script>

</body>
</html>
