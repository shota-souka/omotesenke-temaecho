<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>茶道点前 比較アプリ</title>

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 12px;
      background: #f7f7f7;
    }

    h1 {
      font-size: 20px;
      text-align: center;
      margin: 10px 0;
    }

    #modeBtn {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #333;
      color: white;
      margin-bottom: 12px;
    }

    /* スマホは縦1列 */
    #container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .column {
      background: white;
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    h2 {
      font-size: 16px;
      margin: 8px 0;
    }

    .step {
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    .step strong {
      display: block;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .step div {
      font-size: 13px;
      color: #333;
    }

    .diff {
      background: #ffe5e5;
      border-radius: 6px;
    }
  </style>
</head>

<body>

  <h1>点前比較</h1>
  <button id="modeBtn">違いだけ表示</button>

  <div id="container">
    <div class="column" id="left"></div>
    <div class="column" id="right"></div>
  </div>

  <script>
    const dataA = {
      name: "薄茶・平点前",
      steps: [
        { id: 1, title: "席入り", text: "茶室に入る" },
        { id: 2, title: "茶碗を清める", text: "茶碗を拭く" },
        { id: 3, title: "茶筅通し", text: "茶筅を温める" },
        { id: 4, title: "抹茶を入れる", text: "茶杓で抹茶をすくう" },
        { id: 5, title: "点てる", text: "茶を点てる" }
      ]
    };

    const dataB = {
      name: "薄茶・丸卓",
      steps: [
        { id: 1, title: "席入り", text: "茶室に入る" },
        { id: 2, title: "茶碗を清める", text: "茶碗を拭く" },
        { id: 3, title: "茶筅通し", text: "茶筅を温める" },
        { id: 4, title: "抹茶を入れる", text: "丸卓では手順が異なる" },
        { id: 5, title: "点てる", text: "茶を点てる" }
      ]
    };

    let diffOnly = false;

    function isDifferent(a, b) {
      if (!a || !b) return true;
      return a.title !== b.title || a.text !== b.text;
    }

    function render() {
      const left = document.getElementById("left");
      const right = document.getElementById("right");

      left.innerHTML = "";
      right.innerHTML = "";

      const titleA = document.createElement("h2");
      titleA.textContent = dataA.name;
      left.appendChild(titleA);

      const titleB = document.createElement("h2");
      titleB.textContent = dataB.name;
      right.appendChild(titleB);

      const maxLen = Math.max(dataA.steps.length, dataB.steps.length);

      for (let i = 0; i < maxLen; i++) {
        const a = dataA.steps[i];
        const b = dataB.steps[i];

        const diff = isDifferent(a, b);

        if (diffOnly && !diff) continue;

        const divA = document.createElement("div");
        const divB = document.createElement("div");

        divA.className = "step" + (diff ? " diff" : "");
        divB.className = "step" + (diff ? " diff" : "");

        divA.innerHTML = a
          ? `<strong>${a.id}. ${a.title}</strong><div>${a.text}</div>`
          : `<em>なし</em>`;

        divB.innerHTML = b
          ? `<strong>${b.id}. ${b.title}</strong><div>${b.text}</div>`
          : `<em>なし</em>`;

        left.appendChild(divA);
        right.appendChild(divB);
      }
    }

    document.getElementById("modeBtn").onclick = () => {
      diffOnly = !diffOnly;
      document.getElementById("modeBtn").textContent =
        diffOnly ? "全表示に戻す" : "違いだけ表示";
      render();
    };

    render();
  </script>

</body>
</html>
