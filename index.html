<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>茶道点前 比較アプリ</title>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
    }

    #container {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .column {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px;
      text-align: left;
      background: #fafafa;
    }

    h2 {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .step {
      padding: 8px;
      border-bottom: 1px solid #eee;
    }

    .diff {
      background: #ffe5e5;
    }
  </style>
</head>

<body>

  <h1>点前比較</h1>

  <div id="container">
    <div class="column" id="left"></div>
    <div class="column" id="right"></div>
  </div>

  <script>
    // データ①
    const dataA = {
      name: "薄茶・平点前",
      steps: [
        { id: 1, title: "席入り", text: "茶室に入る" },
        { id: 2, title: "茶碗を清める", text: "茶碗を拭く" },
        { id: 3, title: "茶筅通し", text: "茶筅を温める" },
        { id: 4, title: "抹茶を入れる", text: "茶杓で抹茶をすくう" },
        { id: 5, title: "点てる", text: "茶を点てる" }
      ]
    };

    // データ②
    const dataB = {
      name: "薄茶・丸卓",
      steps: [
        { id: 1, title: "席入り", text: "茶室に入る" },
        { id: 2, title: "茶碗を清める", text: "茶碗を拭く" },
        { id: 3, title: "茶筅通し", text: "茶筅を温める" },
        { id: 4, title: "抹茶を入れる", text: "丸卓では手順が少し異なる" },
        { id: 5, title: "点てる", text: "茶を点てる" }
      ]
    };

    // 比較関数
    function isDifferent(a, b) {
      if (!a || !b) return true;
      return a.title !== b.title || a.text !== b.text;
    }

    // 描画
    function render() {
      const left = document.getElementById("left");
      const right = document.getElementById("right");

      left.innerHTML = "";
      right.innerHTML = "";

      // タイトル
      const titleA = document.createElement("h2");
      titleA.textContent = dataA.name;
      left.appendChild(titleA);

      const titleB = document.createElement("h2");
      titleB.textContent = dataB.name;
      right.appendChild(titleB);

      const maxLen = Math.max(dataA.steps.length, dataB.steps.length);

      for (let i = 0; i < maxLen; i++) {
        const a = dataA.steps[i];
        const b = dataB.steps[i];

        const diff = isDifferent(a, b);

        // 左
        const divA = document.createElement("div");
        divA.className = "step" + (diff ? " diff" : "");
        divA.innerHTML = a
          ? `<strong>${a.id}. ${a.title}</strong><div>${a.text}</div>`
          : `<em>なし</em>`;

        // 右
        const divB = document.createElement("div");
        divB.className = "step" + (diff ? " diff" : "");
        divB.innerHTML = b
          ? `<strong>${b.id}. ${b.title}</strong><div>${b.text}</div>`
          : `<em>なし</em>`;

        left.appendChild(divA);
        right.appendChild(divB);
      }
    }

    render();
  </script>

</body>
</html>
